# Sherpa Check-In — Render blueprint.
# 2026-06-18: migrated off the local Render Postgres onto the shared Supabase
# tax-suite DB. DATABASE_URL is now a manually-set secret (the checkin_app
# session-pooler string), NOT linked fromDatabase, so a blueprint sync can never
# revert the cutover. The sherpa-db block is kept ONLY as a rollback target until
# the new setup is proven; delete it (and the instance) once confident.

databases:
  - name: sherpa-db
    plan: free
    databaseName: sherpa_checkin
    # RETIRED — rollback only. The app no longer uses this. Delete when confident.

services:
  - type: web
    name: sherpa-check-in
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # shared Supabase checkin_app pooler string; set in dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: SMTP_SERVER
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: USE_TLS
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_SHEETS_CREDENTIALS
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: TIMEZONE
        value: America/New_York
      - key: DEFAULT_INTAKE_DAYS
        value: "7"
